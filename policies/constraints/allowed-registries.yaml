apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAllowedRegistries
metadata:
  name: allowed-registries
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
  parameters:
    registries:
      # Replace with your ACR login server
      - "acrdemodeveuseus.azurecr.io/"
      # Common trusted registries
      - "docker.io/library/"
      - "mcr.microsoft.com/"
